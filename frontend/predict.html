<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Severity - Road Accident Prediction System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f3f4f6;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
        }

        .sidebar-header i {
            font-size: 2.5rem;
            color: #2563eb;
        }

        .sidebar-header h3 {
            margin-top: 10px;
            color: #1f2937;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            color: #4b5563;
            text-decoration: none;
            transition: all 0.3s;
            gap: 12px;
        }

        .nav-item:hover, .nav-item.active {
            background: #eff6ff;
            color: #2563eb;
            border-left: 3px solid #2563eb;
        }

        .nav-item i {
            width: 20px;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .logout-btn {
            width: 100%;
            padding: 10px;
            background: #fee2e2;
            color: #dc2626;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: #fecaca;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 20px;
        }

        .prediction-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .prediction-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .prediction-form-card, .result-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }
        
        .prediction-form-card h2, .result-card h2 {
            margin-bottom: 20px;
            color: #1f2937;
            font-size: 1.5rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .checkbox-group input {
            width: auto;
            margin-right: 5px;
        }
        
        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }
        
        .btn-predict {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        .btn-predict:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .loading i {
            font-size: 2rem;
            color: #2563eb;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .severity-badge {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            color: white;
            transition: all 0.3s ease;
        }
        
        .confidence-section {
            margin: 20px 0;
        }
        
        .confidence-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }
        
        .confidence-bar {
            background: #e5e7eb;
            border-radius: 10px;
            height: 35px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .confidence-fill {
            background: linear-gradient(90deg, #2563eb, #60a5fa);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 15px;
            color: white;
            font-weight: bold;
            transition: width 1s ease;
            border-radius: 10px;
        }
        
        .recommendations {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }
        
        .recommendations h4 {
            margin-bottom: 15px;
            color: #1f2937;
        }
        
        .recommendations ul {
            list-style: none;
            padding-left: 0;
        }
        
        .recommendations li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
            line-height: 1.4;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .prediction-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-car-crash"></i>
                <h3>RoadPredict AI</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item active">
                    <i class="fas fa-chart-line"></i>
                    <span>Predict Severity</span>
                </a>
                <a href="dashboard.html#history" class="nav-item">
                    <i class="fas fa-history"></i>
                    <span>History</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div style="margin-bottom: 15px; padding: 10px; background: #f3f4f6; border-radius: 8px;">
                    <div style="font-size: 12px; color: #6b7280;">Logged in as:</div>
                    <div style="font-weight: 600; color: #1f2937;" id="userNameDisplay">User</div>
                </div>
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="prediction-container">
                <div class="prediction-grid">
                    <!-- Left Column: Form -->
                    <div class="prediction-form-card">
                        <h2><i class="fas fa-edit"></i> Accident Details</h2>
                        <form id="predictionForm">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Weather Condition *</label>
                                    <select id="weather" required>
                                        <option value="">Select Weather</option>
                                        <option value="Clear">☀️ Clear</option>
                                        <option value="Rain">🌧️ Rain</option>
                                        <option value="Fog">🌫️ Fog</option>
                                        <option value="Snow">❄️ Snow</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Road Condition *</label>
                                    <select id="roadCondition" required>
                                        <option value="">Select Road Condition</option>
                                        <option value="Dry">🟢 Dry</option>
                                        <option value="Wet">💧 Wet</option>
                                        <option value="Icy">❄️ Icy</option>
                                        <option value="Flooded">🌊 Flooded</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Light Condition</label>
                                    <select id="lightCondition">
                                        <option value="Daylight">☀️ Daylight</option>
                                        <option value="Dark">🌙 Dark</option>
                                        <option value="Dusk/Dawn">🌅 Dusk/Dawn</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Speed Limit (km/h)</label>
                                    <input type="number" id="speedLimit" placeholder="e.g., 60" value="50">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Vehicle Type</label>
                                    <select id="vehicleType">
                                        <option value="Car">🚗 Car</option>
                                        <option value="Truck">🚚 Truck</option>
                                        <option value="Motorcycle">🏍️ Motorcycle</option>
                                        <option value="Bus">🚌 Bus</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Driver Age</label>
                                    <input type="number" id="driverAge" placeholder="e.g., 35" value="35">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Time of Day</label>
                                    <select id="timeOfDay">
                                        <option value="Morning">🌅 Morning (6AM-12PM)</option>
                                        <option value="Afternoon">☀️ Afternoon (12PM-5PM)</option>
                                        <option value="Evening">🌆 Evening (5PM-9PM)</option>
                                        <option value="Night">🌙 Night (9PM-6AM)</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Day of Week</label>
                                    <select id="dayOfWeek">
                                        <option value="Monday">Monday</option>
                                        <option value="Tuesday">Tuesday</option>
                                        <option value="Wednesday">Wednesday</option>
                                        <option value="Thursday">Thursday</option>
                                        <option value="Friday">Friday</option>
                                        <option value="Saturday">Saturday</option>
                                        <option value="Sunday">Sunday</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Traffic Density</label>
                                    <select id="trafficDensity">
                                        <option value="Low">🟢 Low</option>
                                        <option value="Medium" selected>🟡 Medium</option>
                                        <option value="High">🔴 High</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Contributing Factors</label>
                                    <div class="checkbox-group">
                                        <input type="checkbox" id="alcoholInvolved">
                                        <label>🍺 Alcohol Involved</label>
                                    </div>
                                    <div class="checkbox-group">
                                        <input type="checkbox" id="speeding">
                                        <label>⚡ Speeding</label>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn-predict">
                                <i class="fas fa-chart-line"></i> Predict Severity
                            </button>
                        </form>
                    </div>

                    <!-- Right Column: Results -->
                    <div class="result-card">
                        <h2><i class="fas fa-chart-bar"></i> Prediction Results</h2>
                        
                        <!-- Results Container -->
                        <div id="predictionResult" style="display: none;">
                            <div class="severity-badge" id="severityBadge"></div>
                            
                            <div class="confidence-section">
                                <label><i class="fas fa-percent"></i> Confidence Score</label>
                                <div class="confidence-bar">
                                    <div class="confidence-fill" id="confidenceFill" style="width: 0%;">0%</div>
                                </div>
                            </div>

                            <div class="recommendations" id="recommendations"></div>
                        </div>
                        
                        <!-- No Result Message -->
                        <div id="noResultMessage" style="text-align: center; padding: 40px; color: #6b7280;">
                            <i class="fas fa-chart-line" style="font-size: 3rem; margin-bottom: 10px;"></i>
                            <p>Fill in the details and click "Predict Severity" to see results here</p>
                        </div>

                        <!-- Loading Spinner -->
                        <div id="loadingSpinner" style="display: none;" class="loading">
                            <i class="fas fa-spinner"></i>
                            <p>Analyzing accident data...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/predict.js"></script>
    <script>
        // Display user name in sidebar
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const userNameDisplay = document.getElementById('userNameDisplay');
        if (userNameDisplay && user.full_name) {
            userNameDisplay.textContent = user.full_name;
        } else if (userNameDisplay && user.username) {
            userNameDisplay.textContent = user.username;
        }
    </script>
</body>
</html>
